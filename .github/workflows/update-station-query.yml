name: Update Station Query
permissions:
  contents: write

on:
  schedule:
    # Run daily at 23:00 UTC — 02:00 Finnish time in summer (EEST), before morning
    # commuter traffic starts. The check uses a 24h look-ahead window, so results
    # are independent of the run hour. Daily cadence keeps station open/close status
    # (e.g. summer track construction) fresh within ~1 day instead of up to a week.
    - cron: '0 23 * * *'

  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  update-stations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Use a personal access token to allow the workflow to push changes
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run station query update
        run: pnpm run update-station-query

      - name: Refresh stations snapshot
        run: pnpm run update-stations-snapshot

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/utils/api.ts src/data/stations-snapshot.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/utils/api.ts src/data/stations-snapshot.json
          git commit -m "feat: update station query exclusions

          Auto-update based on current commuter traffic status
          - Excludes stations without commuter destinations
          - Re-includes stations that now have commuter traffic

          Generated by automated weekly check on $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.git-check.outputs.changes != 'true'
        run: |
          echo "ℹ️ No changes to station query needed - all stations still have the same commuter traffic status"
